<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Tips – CCM Consultancy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;min-height:100vh;color:#1a1a1a}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
.bg-participant{background:#1a1f3c;background-image:radial-gradient(ellipse at 0% 0%,rgba(198,37,47,.35) 0%,transparent 50%),radial-gradient(ellipse at 100% 100%,rgba(37,99,235,.3) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(99,37,198,.2) 0%,transparent 40%)}
.bg-participant::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.bg-participant>*{position:relative;z-index:1}
.bg-admin{background:#f0f2f5}
.nav{background:rgba(255,255,255,.07);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.1);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.nav-admin{background:rgba(255,255,255,.95);border-bottom:1px solid #e0e0e0}
.nav-logo{height:32px;object-fit:contain}
.nav-title{font-size:14px;font-weight:500;color:rgba(255,255,255,.8)}
.nav-title-admin{color:#444}
.btn{padding:9px 20px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;line-height:1}
.btn-primary{background:#c6252f;color:#fff}
.btn-primary:hover{background:#a81e27}
.btn-white{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)}
.btn-white:hover{background:rgba(255,255,255,.25)}
.btn-secondary{background:#fff;color:#444;border:1px solid #ddd}
.btn-secondary:hover{background:#f5f5f5}
.btn-ghost-admin{background:transparent;color:#666;border:1px solid #ddd}
.btn-ghost-admin:hover{background:#f5f5f5}
.btn-sm{padding:5px 14px;font-size:13px}
input,textarea,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a}
input:focus,textarea:focus{outline:none;border-color:#c6252f;box-shadow:0 0 0 3px rgba(198,37,47,.1)}
label{font-size:13px;font-weight:500;color:#555;display:block;margin-bottom:4px}
.form-group{margin-bottom:16px}
.optional-tag{font-size:11px;color:#aaa;font-weight:400;margin-left:4px}
.card-admin{background:#fff;border-radius:12px;border:1px solid #e8e4de;padding:20px 24px}
.glass{background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2);border-radius:20px}
#screen-login{align-items:center;justify-content:center}
.login-box{width:100%;max-width:380px;padding:40px}
.login-box h1{font-size:22px;font-weight:700;margin-bottom:6px}
.login-box p{font-size:14px;color:#888;margin-bottom:28px}
.dash-content{padding:24px;max-width:960px;width:100%;margin:0 auto;flex:1}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.dash-header h2{font-size:20px;font-weight:700}
.workshop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.workshop-card{background:#fff;border-radius:14px;border:1px solid #e8e4de;padding:20px;transition:all .15s}
.workshop-card:hover{border-color:#c6252f;box-shadow:0 4px 16px rgba(198,37,47,.1)}
.workshop-card h3{font-size:15px;font-weight:600;margin-bottom:4px}
.workshop-card .meta{font-size:12px;color:#999;margin-bottom:12px}
.stats{display:flex;gap:8px;flex-wrap:wrap}
.stat-pill{font-size:12px;background:#fff0f0;color:#c6252f;padding:3px 10px;border-radius:20px;border:1px solid rgba(198,37,47,.15)}
.card-actions{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.empty-state{text-align:center;padding:60px 20px;color:#999}
.share-box{background:#fff8f0;border:1px solid #fde68a;border-radius:10px;padding:14px 16px;margin-top:14px}
.share-label{font-size:12px;color:#92400e;font-weight:600;margin-bottom:6px}
.share-url{font-size:12px;color:#555;background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:7px 10px;word-break:break-all;margin-bottom:8px}
.editor-content{padding:24px;max-width:700px;width:100%;margin:0 auto;flex:1}
.logo-upload-area{border:2px dashed #ddd;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .15s}
.logo-upload-area:hover{border-color:#c6252f;background:#fff8f8}
.logo-preview{max-height:50px;max-width:160px;object-fit:contain;margin:8px auto 0;display:block}
.analytics-content{padding:24px;max-width:820px;width:100%;margin:0 auto;flex:1}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.metric-card{background:#fff;border-radius:10px;border:1px solid #e8e4de;padding:16px;text-align:center}
.metric-card .num{font-size:28px;font-weight:700;color:#c6252f}
.metric-card .lbl{font-size:12px;color:#888;margin-top:2px}
.tip-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tip-bar-label{font-size:13px;color:#555;width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.tip-bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:8px}
.tip-bar-fill{background:#c6252f;height:8px;border-radius:4px;transition:width .4s}
.tip-bar-count{font-size:12px;color:#888;min-width:24px;text-align:right}
.participant-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.participant-row:last-child{border-bottom:none}
#screen-welcome{align-items:center;justify-content:center}
.welcome-wrap{width:100%;max-width:460px;padding:24px}
.welcome-card{padding:36px 36px 40px;text-align:center}
.welcome-logo{max-height:60px;max-width:200px;object-fit:contain;margin:0 auto 20px;display:block}
.welcome-initial{width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;font-weight:700;color:#fff;background:#c6252f}
.text-panel{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:20px 22px;margin-bottom:20px;width:100%}
.text-panel h1{font-size:21px;font-weight:700;color:#fff;margin-bottom:8px}
.text-panel p{font-size:14px;color:rgba(255,255,255,.7);line-height:1.6;margin:0}
.welcome-card label{color:rgba(255,255,255,.7)}
.welcome-card input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:10px}
.welcome-card input::placeholder{color:rgba(255,255,255,.4)}
.welcome-card input:focus{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5);box-shadow:none}
.btn-launch{width:100%;margin-top:16px;padding:14px;font-size:16px;font-weight:600;border-radius:12px;border:none;cursor:pointer;background:#c6252f;color:#fff;transition:all .15s}
.btn-launch:hover{background:#a81e27;transform:translateY(-1px)}
.tips-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.progress-wrap{width:100%;max-width:560px;margin-bottom:20px}
.progress-track{background:rgba(255,255,255,.15);border-radius:4px;height:4px}
.progress-fill{height:4px;border-radius:4px;background:#c6252f;transition:width .3s}
.progress-label{font-size:12px;color:rgba(255,255,255,.5);text-align:right;margin-top:5px}
.tip-card{padding:44px 40px;width:100%;max-width:560px;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.slide-badge{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 16px;border-radius:20px;margin-bottom:18px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);background:rgba(255,255,255,.08)}
.slide-badge.tip-b{background:rgba(198,37,47,.3);border-color:rgba(198,37,47,.5);color:#fca5a5}
.slide-badge.intro-b{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.4);color:#6ee7b7}
.slide-badge.cta-b{background:rgba(245,158,11,.2);border-color:rgba(245,158,11,.4);color:#fcd34d}
.slide-badge.thanks-b{background:rgba(139,92,246,.2);border-color:rgba(139,92,246,.4);color:#c4b5fd}
.tip-card h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:10px;line-height:1.3}
.tip-text{font-size:18px;line-height:1.7;color:rgba(255,255,255,.9)}
.tip-subtext{font-size:14px;color:rgba(255,255,255,.55);margin-top:10px;line-height:1.6}
.star-btn{margin-top:24px;display:flex;align-items:center;gap:8px;padding:11px 24px;border-radius:24px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);cursor:pointer;font-size:14px;font-weight:500;color:rgba(255,255,255,.8);transition:all .15s}
.star-btn:hover{background:rgba(255,255,255,.15)}
.star-btn.starred{background:rgba(245,158,11,.2);border-color:rgba(245,158,11,.6);color:#fcd34d}
.star-btn svg{width:16px;height:16px}
.nav-row{display:flex;gap:12px;margin-top:22px}
.cta-wrap{margin-top:18px;width:100%}
.cta-wrap textarea{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:10px;resize:none}
.cta-wrap textarea::placeholder{color:rgba(255,255,255,.4)}
.summary-content{padding:24px;max-width:600px;width:100%;margin:0 auto;flex:1}
.summary-content h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px}
.summary-sub{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:20px}
.summary-tip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:14px 18px;margin-bottom:10px;font-size:14px;line-height:1.5;display:flex;align-items:flex-start;gap:10px;color:rgba(255,255,255,.9)}
.summary-tip .star-icon{color:#fbbf24;font-size:16px;flex-shrink:0;margin-top:1px}
.summary-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.all-section{margin-top:28px}
.all-section h3{font-size:15px;font-weight:600;margin-bottom:12px;color:rgba(255,255,255,.6)}
.loading-overlay{position:fixed;inset:0;background:rgba(26,31,60,.85);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#c6252f;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.confetti-piece{position:absolute;width:8px;height:8px;opacity:0;animation:fall 2.5s ease-in forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.slide-enter{animation:sIn .3s ease}
@keyframes sIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.tip-card{padding:28px 20px}.welcome-card{padding:28px 20px}.metrics-row{grid-template-columns:1fr 1fr}.metrics-row .metric-card:last-child{grid-column:1/-1}}
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay"><div class="loading-spinner"></div></div>
<!-- LOGIN -->
<div id="screen-login" class="screen active bg-admin">
  <div style="display:flex;align-items:center;justify-content:center;flex:1">
    <div class="login-box card-admin">
      <img src="./ccm_logo_rgb.png" alt="CCM" style="height:44px;object-fit:contain;display:block;margin:0 auto 16px"><h1>Learning Tips</h1>
      <p>CCM Consultancy — Admin sign in</p>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign in</button>
      <div id="login-err" style="color:#ef4444;font-size:13px;margin-top:8px;text-align:center;display:none">Incorrect password</div>
    </div>
  </div>
</div>
<!-- DASHBOARD -->
<div id="screen-dashboard" class="screen bg-admin">
  <div class="nav nav-admin">
    <div style="display:flex;align-items:center;gap:10px">
      <img src="./ccm_logo_rgb.png" style="height:28px;object-fit:contain" alt="CCM">
      <span class="nav-title nav-title-admin" style="font-weight:700;font-size:16px">Learning Tips</span>
    </div>
    <button class="btn btn-ghost-admin btn-sm" onclick="doLogout()">Sign out</button>
  </div>
  <div class="dash-content">
    <div class="dash-header">
      <h2>My Workshops</h2>
      <button class="btn btn-primary btn-sm" onclick="openEditor(null)">+ New workshop</button>
    </div>
    <div id="workshop-grid" class="workshop-grid"></div>
  </div>
</div>
<!-- EDITOR -->
<div id="screen-editor" class="screen bg-admin">
  <div class="nav nav-admin">
    <span class="nav-title nav-title-admin" id="editor-nav-title">New workshop</span>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost-admin btn-sm" onclick="showScreen('dashboard');renderDashboard()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveWorkshop()">Save</button>
    </div>
  </div>
  <div class="editor-content">
    <div class="form-group"><label>Workshop title</label><input type="text" id="ws-title" placeholder="e.g. Leadership Essentials – April 2026"></div>
    <div class="form-group"><label>Part label <span class="optional-tag">(shown on dashboard card, e.g. Part 1, Part 2, Session A)</span></label><input type="text" id="ws-part" placeholder="e.g. Part 1"></div>
    <div class="form-group">
      <label>Company logo <span class="optional-tag">(upload file)</span></label>
      <div class="logo-upload-area" onclick="document.getElementById('logo-file').click()">
        <input type="file" id="logo-file" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">
        <div id="logo-upload-hint"><div style="font-size:24px;margin-bottom:6px">🖼️</div><div style="font-size:13px;color:#888">Click to upload your logo</div><div style="font-size:11px;color:#bbb;margin-top:2px">PNG, JPG, SVG</div></div>
        <img id="logo-preview-img" class="logo-preview" src="" alt="" style="display:none">
      </div>
      <input type="hidden" id="ws-logo-data">
    </div>
    <div class="form-group"><label>Introduction message <span class="optional-tag">(welcome slide)</span></label><textarea id="ws-intro" rows="3" placeholder="Welcome! Here are your top takeaways from today's session..."></textarea></div>
    <div class="form-group"><label>Call to action title <span class="optional-tag">(slide after tips)</span></label><input type="text" id="ws-cta-title" placeholder="e.g. What will you commit to trying first?"></div>
    <div class="form-group"><label>Call to action subtitle <span class="optional-tag">(optional)</span></label><input type="text" id="ws-cta-sub" placeholder="e.g. Even one small step makes a difference."></div>
    <div class="form-group"><label>Thank you message</label><input type="text" id="ws-thanks-title" placeholder="e.g. Thank you for being here!"></div>
    <div class="form-group"><label>Thank you subtitle</label><input type="text" id="ws-thanks-sub" placeholder="e.g. We hope today sparks real change. See you next time!"></div>
    <div class="form-group"><label>Tips / hacks <span class="optional-tag">— one per line</span></label><textarea id="ws-tips" rows="10" placeholder="Use the 2-minute rule: if it takes less than 2 minutes, do it now.&#10;Schedule your hardest task first thing in the morning."></textarea></div>
    <div id="editor-err" style="color:#ef4444;font-size:13px;display:none;margin-bottom:8px"></div>
    <button class="btn btn-secondary" style="margin-top:4px;margin-bottom:32px" onclick="previewWorkshop()">Preview as participant</button>
  </div>
</div>
<!-- ANALYTICS -->
<div id="screen-analytics" class="screen bg-admin">
  <div class="nav nav-admin">
    <span class="nav-title nav-title-admin" id="analytics-title"></span>
    <button class="btn btn-ghost-admin btn-sm" onclick="showScreen('dashboard');renderDashboard()">Back</button>
  </div>
  <div class="analytics-content">
    <div class="metrics-row">
      <div class="metric-card"><div class="num" id="a-views">0</div><div class="lbl">Total views</div></div>
      <div class="metric-card"><div class="num" id="a-downloads">0</div><div class="lbl">Downloads</div></div>
      <div class="metric-card"><div class="num" id="a-stars">0</div><div class="lbl">Tips starred</div></div>
    </div>
    <div class="card-admin" style="margin-bottom:16px"><h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Most loved tips</h3><div id="tip-bars"></div></div>
    <div class="card-admin"><h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Participants</h3><div id="participants-list"></div></div>
  </div>
</div>
<!-- WELCOME -->
<div id="screen-welcome" class="screen bg-participant">
  <div style="display:flex;align-items:center;justify-content:center;flex:1;padding:24px">
    <div class="welcome-wrap">
      <div class="welcome-card glass">
        <img id="w-logo" class="welcome-logo" src="" alt="" style="display:none" onerror="this.style.display='none'">
        <div id="w-initial" class="welcome-initial" style="display:none"></div>
        <div class="text-panel"><h1 id="w-title"></h1><p id="w-desc"></p></div>
        <div class="form-group" style="text-align:left">
          <label>Your name <span class="optional-tag" style="color:rgba(255,255,255,.4)">(optional)</span></label>
          <input type="text" id="participant-name" placeholder="e.g. Sarah" onkeydown="if(event.key==='Enter')startTips()">
        </div>
        <button class="btn-launch" onclick="startTips()">Let's go →</button>
      </div>
    </div>
  </div>
</div>
<!-- TIPS -->
<div id="screen-tips" class="screen bg-participant">
  <div class="nav">
    <img id="t-logo" class="nav-logo" src="" alt="" style="display:none" onerror="this.style.display='none'">
    <span class="nav-title" id="t-title"></span>
    <div style="width:60px"></div>
  </div>
  <div class="tips-body">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
      <div class="progress-label" id="prog-label"></div>
    </div>
    <div class="tip-card glass slide-enter" id="tip-card-inner">
      <div class="slide-badge" id="slide-badge">Tip</div>
      <h2 id="slide-heading" style="display:none"></h2>
      <div class="tip-text" id="tip-text"></div>
      <div class="tip-subtext" id="tip-subtext" style="display:none"></div>
      <div class="cta-wrap" id="cta-wrap" style="display:none"><textarea id="cta-response" rows="3" placeholder="Type your commitment here..."></textarea></div>
      <button class="star-btn" id="star-btn" onclick="toggleStar()" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span id="star-label">I want to try this!</span>
      </button>
    </div>
    <div class="nav-row">
      <button class="btn btn-white" id="btn-back" onclick="moveTip(-1)" style="visibility:hidden">← Back</button>
      <button class="btn btn-primary" id="btn-next" onclick="moveTip(1)">Next →</button>
    </div>
  </div>
</div>
<!-- SUMMARY -->
<div id="screen-summary" class="screen bg-participant">
  <div class="nav">
    <img id="s-logo" class="nav-logo" src="" alt="" style="display:none" onerror="this.style.display='none'">
    <span class="nav-title" id="s-title"></span>
    <div style="width:60px"></div>
  </div>
  <div class="summary-content">
    <h2>Your takeaways</h2>
    <p class="summary-sub" id="s-sub"></p>
    <div id="starred-list"></div>
    <div class="summary-actions">
      <button class="btn btn-primary" onclick="downloadPDF(false)">Download all tips (PDF)</button>
      <button class="btn btn-white" onclick="downloadPDF(true)">Starred tips only</button>
      <button class="btn btn-white" onclick="restartTips()">Review again</button>
    </div>
    <div class="all-section" id="all-section"></div>
  </div>
</div>
<div id="confetti-wrap" class="confetti-wrap"></div>

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function loading(show){document.getElementById('loading-overlay').style.display=show?'flex':'none';}

async function sb(method,path,body){
  try{
    var res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{
      method:method,
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':method==='POST'?'return=representation':'return=minimal'},
      body:body?JSON.stringify(body):undefined
    });
    if(!res.ok){var e=await res.text();console.error('SB error:',res.status,e);return null;}
    if(res.status===204)return true;
    var txt=await res.text();
    return txt?JSON.parse(txt):null;
  }catch(e){console.error('SB fetch error:',e);return null;}
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('screen-'+id).classList.add('active');
}

window.addEventListener('load',async function(){
  var params=new URLSearchParams(location.search);
  var wsid=params.get('ws');
  if(wsid){
    loading(true);
    var data=await sb('GET','workshops?id=eq.'+wsid+'&select=*');
    loading(false);
    if(data&&data.length){
      currentWs=data[0];
      currentWs.tips=currentWs.tips||[];
      isPreview=false;
      startParticipantFlow(currentWs);
      return;
    }
  }
});

function doLogin(){
  if(document.getElementById('login-pw').value===ADMIN_PW){
    showScreen('dashboard');renderDashboard();
  }else{
    document.getElementById('login-err').style.display='block';
  }
}
function doLogout(){showScreen('login');}

function handleLogoUpload(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var data=ev.target.result;
    document.getElementById('ws-logo-data').value=data;
    var prev=document.getElementById('logo-preview-img');
    prev.src=data;prev.style.display='block';
    document.getElementById('logo-upload-hint').style.display='none';
  };
  reader.readAsDataURL(file);
}

async function renderDashboard(){
  loading(true);
  var data=await sb('GET','workshops?select=*&order=created_at.desc');
  loading(false);
  workshops=data||[];
  var grid=document.getElementById('workshop-grid');
  if(!workshops.length){
    grid.innerHTML='<div class="empty-state"><p>No workshops yet.</p><button class="btn btn-primary btn-sm" onclick="openEditor(null)">+ New workshop</button></div>';
    return;
  }
  var analyticsData=await sb('GET','analytics?select=workshop_id,downloaded,starred_tips');
  var aMap={};
  (analyticsData||[]).forEach(function(a){
    if(!aMap[a.workshop_id])aMap[a.workshop_id]={views:0,downloads:0,stars:0};
    aMap[a.workshop_id].views++;
    if(a.downloaded)aMap[a.workshop_id].downloads++;
    if(a.starred_tips)aMap[a.workshop_id].stars+=(a.starred_tips||[]).length;
  });
  var baseUrl=location.origin+location.pathname;
  grid.innerHTML=workshops.map(function(ws){
    var a=aMap[ws.id]||{views:0,downloads:0,stars:0};
    var shareUrl=baseUrl+'?ws='+ws.id;
    return '<div class="workshop-card">'+
      +(ws.part_label?'<div style="display:inline-block;font-size:11px;font-weight:700;background:#c6252f;color:#fff;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.3px">'+esc(ws.part_label)+'</div>':'')+
      '<h3>'+esc(ws.title)+'</h3>'+
      '<div class="meta">'+(ws.tips||[]).length+' tips &bull; '+new Date(ws.created_at).toLocaleDateString()+'</div>'+
      '<div class="stats"><span class="stat-pill">'+a.views+' views</span><span class="stat-pill">'+a.downloads+' DL</span><span class="stat-pill">'+a.stars+' stars</span></div>'+
      '<div class="share-box">'+
        '<div class="share-label">Participant link — share this!</div>'+
        '<div class="share-url">'+shareUrl+'</div>'+
        '<button class="btn btn-secondary btn-sm" onclick="copyLink(\''+shareUrl+'\',this)">Copy link</button>'+
      '</div>'+
      '<div class="card-actions">'+
        '<button class="btn btn-primary btn-sm" onclick="previewAsAdmin(\''+ws.id+'\')">Preview</button>'+
        '<button class="btn btn-ghost-admin btn-sm" onclick="openAnalytics(\''+ws.id+'\')">Analytics</button>'+
        '<button class="btn btn-ghost-admin btn-sm" onclick="openEditor(\''+ws.id+'\')">Edit</button>'+
        '<button class="btn btn-ghost-admin btn-sm" style="color:#ef4444" onclick="deleteWs(\''+ws.id+'\')">Delete</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function copyLink(url,btn){
  navigator.clipboard.writeText(url).then(function(){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy link';},2000);});
}

async function deleteWs(id){
  if(!confirm('Delete this workshop?'))return;
  loading(true);
  await sb('DELETE','workshops?id=eq.'+id);
  loading(false);
  renderDashboard();
}

function openEditor(id){
  editingWsId=id;
  var ws=id?workshops.find(function(w){return w.id===id;}):null;
  document.getElementById('editor-nav-title').textContent=id?'Edit workshop':'New workshop';
  document.getElementById('ws-title').value=(ws&&ws.title)||'';
  document.getElementById('ws-part').value=(ws&&ws.part_label)||'';
  document.getElementById('ws-intro').value=(ws&&ws.intro)||'';
  document.getElementById('ws-cta-title').value=(ws&&ws.cta_title)||'';
  document.getElementById('ws-cta-sub').value=(ws&&ws.cta_sub)||'';
  document.getElementById('ws-thanks-title').value=(ws&&ws.thanks_title)||'';
  document.getElementById('ws-thanks-sub').value=(ws&&ws.thanks_sub)||'';
  document.getElementById('ws-tips').value=((ws&&ws.tips)||[]).join('\n');
  var logoData=(ws&&ws.logo_data)||'';
  document.getElementById('ws-logo-data').value=logoData;
  var prev=document.getElementById('logo-preview-img');
  if(logoData){prev.src=logoData;prev.style.display='block';document.getElementById('logo-upload-hint').style.display='none';}
  else{prev.style.display='none';document.getElementById('logo-upload-hint').style.display='block';}
  document.getElementById('editor-err').style.display='none';
  showScreen('editor');
}

async function saveWorkshop(){
  var title=document.getElementById('ws-title').value.trim();
  var tips=document.getElementById('ws-tips').value.split('\n').map(function(t){return t.trim();}).filter(Boolean);
  var err=document.getElementById('editor-err');
  if(!title){err.textContent='Please enter a workshop title.';err.style.display='block';return;}
  if(!tips.length){err.textContent='Please enter at least one tip.';err.style.display='block';return;}
  err.style.display='none';
  var payload={
    title:title,
    part_label:document.getElementById('ws-part').value.trim(),
    intro:document.getElementById('ws-intro').value.trim(),
    cta_title:document.getElementById('ws-cta-title').value.trim(),
    cta_sub:document.getElementById('ws-cta-sub').value.trim(),
    thanks_title:document.getElementById('ws-thanks-title').value.trim(),
    thanks_sub:document.getElementById('ws-thanks-sub').value.trim(),
    logo_data:document.getElementById('ws-logo-data').value,
    tips:tips
  };
  loading(true);
  if(editingWsId){
    await sb('PATCH','workshops?id=eq.'+editingWsId,payload);
  }else{
    payload.id=uid();
    await sb('POST','workshops',payload);
  }
  loading(false);
  showScreen('dashboard');
  renderDashboard();
}

function buildTempWs(){
  return{id:null,part_label:document.getElementById('ws-part').value.trim(),title:document.getElementById('ws-title').value.trim(),intro:document.getElementById('ws-intro').value.trim(),cta_title:document.getElementById('ws-cta-title').value.trim(),cta_sub:document.getElementById('ws-cta-sub').value.trim(),thanks_title:document.getElementById('ws-thanks-title').value.trim(),thanks_sub:document.getElementById('ws-thanks-sub').value.trim(),logo_data:document.getElementById('ws-logo-data').value,tips:document.getElementById('ws-tips').value.split('\n').map(function(t){return t.trim();}).filter(Boolean)};
}

function previewWorkshop(){
  var title=document.getElementById('ws-title').value.trim();
  var tips=document.getElementById('ws-tips').value.split('\n').map(function(t){return t.trim();}).filter(Boolean);
  if(!title||!tips.length){document.getElementById('editor-err').textContent='Add a title and at least one tip to preview.';document.getElementById('editor-err').style.display='block';return;}
  isPreview=true;currentWs=buildTempWs();
  startParticipantFlow(currentWs);
}

async function previewAsAdmin(id){
  isPreview=true;
  var ws=workshops.find(function(w){return w.id===id;});
  currentWs=ws;startParticipantFlow(ws);
}

async function openAnalytics(id){
  var ws=workshops.find(function(w){return w.id===id;});
  document.getElementById('analytics-title').textContent=ws.title;
  loading(true);
  var data=await sb('GET','analytics?workshop_id=eq.'+id+'&select=*&order=created_at.desc');
  loading(false);
  var rows=data||[];
  document.getElementById('a-views').textContent=rows.length;
  document.getElementById('a-downloads').textContent=rows.filter(function(r){return r.downloaded;}).length;
  var allStarred=rows.flatMap(function(r){return r.starred_tips||[];});
  document.getElementById('a-stars').textContent=allStarred.length;
  var tipCounts=new Array((ws.tips||[]).length).fill(0);
  allStarred.forEach(function(i){if(tipCounts[i]!==undefined)tipCounts[i]++;});
  var maxC=Math.max(1,...tipCounts);
  document.getElementById('tip-bars').innerHTML=(ws.tips||[]).map(function(t,i){
    return '<div class="tip-bar-row"><div class="tip-bar-label" title="'+esc(t)+'">'+esc(t)+'</div><div class="tip-bar-track"><div class="tip-bar-fill" style="width:'+Math.round((tipCounts[i]/maxC)*100)+'%"></div></div><div class="tip-bar-count">'+tipCounts[i]+'</div></div>';
  }).join('');
  var pl=document.getElementById('participants-list');
  pl.innerHTML=rows.length?rows.map(function(r){
    return '<div class="participant-row"><span>'+esc(r.participant_name||'Anonymous')+'</span><span style="font-size:12px;color:#aaa">'+new Date(r.created_at).toLocaleDateString()+' &bull; '+(r.downloaded?'Downloaded':'Viewed')+'</span></div>';
  }).join(''):'<p style="font-size:14px;color:#aaa">No participants yet.</p>';
  showScreen('analytics');
}

function startParticipantFlow(ws){
  var logo=document.getElementById('w-logo'),init=document.getElementById('w-initial');
  if(ws.logo_data){logo.src=ws.logo_data;logo.style.display='block';init.style.display='none';}
  else{logo.style.display='none';init.style.display='flex';init.textContent=(ws.title||'W').charAt(0).toUpperCase();}
  document.getElementById('w-title').textContent=ws.title;
  document.getElementById('w-desc').textContent=ws.intro||(ws.tips||[]).length+' tips from today\'s workshop — swipe through, star your favourites, and take them with you.';
  document.getElementById('participant-name').value='';
  showScreen('welcome');
}

function buildSlides(ws){
  var s=[];
  s.push({type:'intro',text:ws.intro||'Welcome to '+ws.title+'! Tap through your top takeaways and star the ones you\'ll try.'});
  (ws.tips||[]).forEach(function(t,i){s.push({type:'tip',index:i,text:t});});
  if(ws.cta_title)s.push({type:'cta',heading:ws.cta_title,sub:ws.cta_sub||''});
  s.push({type:'thanks',heading:ws.thanks_title||'Thank you for being here!',sub:ws.thanks_sub||'We hope today\'s session inspires real action. See you next time!'});
  return s;
}

function startTips(){
  participantName=document.getElementById('participant-name').value.trim();
  var ws=currentWs;
  slides=buildSlides(ws);
  starred=new Array((ws.tips||[]).length).fill(false);
  currentSlideIndex=0;
  var tl=document.getElementById('t-logo');
  if(ws.logo_data){tl.src=ws.logo_data;tl.style.display='block';}else tl.style.display='none';
  document.getElementById('t-title').textContent=ws.title;
  renderSlide();
  showScreen('tips');
}

function renderSlide(){
  var ws=currentWs;
  var sl=slides[currentSlideIndex],total=slides.length,tipCount=(ws.tips||[]).length;
  document.getElementById('prog-fill').style.width=Math.round(((currentSlideIndex+1)/total)*100)+'%';
  document.getElementById('prog-label').textContent=(currentSlideIndex+1)+' of '+total;
  var badge=document.getElementById('slide-badge'),heading=document.getElementById('slide-heading'),tipText=document.getElementById('tip-text'),tipSub=document.getElementById('tip-subtext'),starBtn=document.getElementById('star-btn'),ctaWrap=document.getElementById('cta-wrap');
  heading.style.display='none';tipSub.style.display='none';starBtn.style.display='none';ctaWrap.style.display='none';tipText.textContent='';
  if(sl.type==='intro'){
    badge.className='slide-badge intro-b';badge.textContent='Welcome';
    tipText.textContent=sl.text;
    document.getElementById('btn-next').textContent='Start →';
  }else if(sl.type==='tip'){
    badge.className='slide-badge tip-b';badge.textContent='Tip '+(sl.index+1)+' of '+tipCount;
    tipText.textContent=sl.text;
    starBtn.style.display='flex';
    starBtn.classList.toggle('starred',starred[sl.index]);
    document.getElementById('star-label').textContent=starred[sl.index]?'Starred!':'I want to try this!';
    document.getElementById('btn-next').textContent='Next →';
  }else if(sl.type==='cta'){
    badge.className='slide-badge cta-b';badge.textContent='Your commitment';
    heading.textContent=sl.heading;heading.style.display='block';
    if(sl.sub){tipSub.textContent=sl.sub;tipSub.style.display='block';}
    ctaWrap.style.display='block';
    document.getElementById('btn-next').textContent='Next →';
  }else if(sl.type==='thanks'){
    badge.className='slide-badge thanks-b';badge.textContent='Thank you';
    heading.textContent=sl.heading;heading.style.display='block';
    tipText.textContent=sl.sub;
    document.getElementById('btn-next').textContent='See my summary →';
  }
  document.getElementById('btn-back').style.visibility=currentSlideIndex===0?'hidden':'visible';
  var card=document.getElementById('tip-card-inner');
  card.classList.remove('slide-enter');void card.offsetWidth;card.classList.add('slide-enter');
}

function moveTip(dir){
  if(dir===1&&currentSlideIndex===slides.length-1){showSummary();return;}
  currentSlideIndex=Math.max(0,Math.min(slides.length-1,currentSlideIndex+dir));
  renderSlide();
}

function toggleStar(){
  var sl=slides[currentSlideIndex];if(sl.type!=='tip')return;
  starred[sl.index]=!starred[sl.index];
  renderSlide();
}

async function showSummary(){
  showConfetti();
  var ws=currentWs;
  var sl=document.getElementById('s-logo');
  if(ws.logo_data){sl.src=ws.logo_data;sl.style.display='block';}else sl.style.display='none';
  document.getElementById('s-title').textContent=ws.title;
  var starredTips=(ws.tips||[]).filter(function(_,i){return starred[i];});
  var starredIndices=starred.map(function(v,i){return v?i:-1;}).filter(function(i){return i>=0;});
  document.getElementById('s-sub').textContent=starredTips.length?'You starred '+starredTips.length+' tip'+(starredTips.length>1?'s':'')+' to try:':'You\'ve reviewed all '+(ws.tips||[]).length+' tips!';
  document.getElementById('starred-list').innerHTML=starredTips.length?starredTips.map(function(t){return '<div class="summary-tip"><span class="star-icon">★</span><span>'+esc(t)+'</span></div>';}).join(''):'<p style="font-size:14px;color:rgba(255,255,255,.5);margin-bottom:8px">You didn\'t star any tips this time.</p>';
  document.getElementById('all-section').innerHTML='<h3>All tips</h3>'+(ws.tips||[]).map(function(t,i){return '<div class="summary-tip">'+(starred[i]?'<span class="star-icon">★</span>':'<span style="color:rgba(255,255,255,.2)">☆</span>')+'<span>'+esc(t)+'</span></div>';}).join('');
  if(!isPreview&&ws.id){
    await sb('POST','analytics',{workshop_id:ws.id,participant_name:participantName||'Anonymous',starred_tips:starredIndices,downloaded:false});
  }
  showScreen('summary');
}

function restartTips(){
  currentSlideIndex=0;starred=new Array((currentWs.tips||[]).length).fill(false);
  renderSlide();showScreen('tips');
}

async function downloadPDF(starredOnly){
  var jsPDFObj=window.jspdf;
  var doc=new jsPDFObj.jsPDF({unit:'mm',format:'a4'});
  var ws=currentWs;
  var tips=starredOnly?(ws.tips||[]).filter(function(_,i){return starred[i];}):(ws.tips||[]);
  var margin=20,pageW=210,cW=pageW-margin*2;
  var headerBottomY=20;
  if(ws.logo_data){
    try{var ext=ws.logo_data.includes('png')?'PNG':'JPEG';doc.addImage(ws.logo_data,ext,margin,10,0,18);headerBottomY=34;}catch(e){}
  }
  var titleY=headerBottomY+8;
  doc.setTextColor(20,20,20);doc.setFontSize(15);doc.setFont('helvetica','bold');
  var titleLines=doc.splitTextToSize(ws.title,cW);
  doc.text(titleLines,margin,titleY);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);
  doc.text(starredOnly?'My starred tips':'All tips — '+new Date().toLocaleDateString(),margin,titleY+titleLines.length*6+2);
  var divY=titleY+titleLines.length*6+10;
  doc.setDrawColor(220,220,220);doc.setLineWidth(0.4);doc.line(margin,divY,pageW-margin,divY);
  var y=divY+10;
  doc.setTextColor(30,30,30);
  // For "all tips" PDF, track original index to check starred status
  var allTips=ws.tips||[];
  var tipIndices=starredOnly?allTips.map(function(_,i){return i;}).filter(function(i){return starred[i];}):allTips.map(function(_,i){return i;});
  tips.forEach(function(tip,n){
    var origIndex=tipIndices[n];
    var isStarred=starred[origIndex];
    if(y>272){doc.addPage();y=20;}
    // Row height depends on tip length
    var lines=doc.splitTextToSize(tip,cW-20);
    var rowH=Math.max(lines.length*6+8,18);
    // Background
    doc.setFillColor(isStarred?255:248,isStarred?248:242,isStarred?230:242);
    doc.roundedRect(margin,y-5,cW,rowH,2,2,'F');
    // Left badge — red for starred, grey for unstarred
    doc.setFillColor(isStarred?198:180,isStarred?37:180,isStarred?47:180);
    doc.roundedRect(margin,y-5,8,rowH,1,1,'F');
    // Number
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.text(String(n+1),margin+4,y+Math.min(rowH/2-1,5),{align:'center'});
    // Star indicator for all-tips PDF
    if(!starredOnly&&isStarred){
      doc.setTextColor(198,37,47);doc.setFontSize(10);
      doc.text('★',pageW-margin-4,y+Math.min(rowH/2-1,5),{align:'right'});
    }
    // Tip text
    doc.setTextColor(30,30,30);doc.setFont('helvetica','normal');doc.setFontSize(10);
    doc.text(lines,margin+12,y+5);
    y+=rowH+6;
  });
  if(participantName){doc.setFontSize(9);doc.setTextColor(160,160,160);doc.text('Prepared for: '+participantName,margin,290);}
  doc.setFontSize(9);doc.setTextColor(160,160,160);doc.text(ws.title,pageW-margin,290,{align:'right'});
  doc.save(ws.title.replace(/\s+/g,'-')+'-tips.pdf');
  if(!isPreview&&ws.id){
    var rows=await sb('GET','analytics?workshop_id=eq.'+ws.id+'&participant_name=eq.'+(participantName||'Anonymous')+'&order=created_at.desc&limit=1');
    if(rows&&rows.length){await sb('PATCH','analytics?id=eq.'+rows[0].id,{downloaded:true});}
  }
}

function showConfetti(){
  var wrap=document.getElementById('confetti-wrap');wrap.innerHTML='';
  var cols=['#c6252f','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899'];
  for(var i=0;i<60;i++){
    var el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText='left:'+Math.random()*100+'%;top:-10px;background:'+cols[Math.floor(Math.random()*cols.length)]+';border-radius:'+(Math.random()>.5?'50%':'2px')+';animation-delay:'+Math.random()*1.5+'s;animation-duration:'+(2+Math.random()*1.5)+'s';
    wrap.appendChild(el);
  }
  setTimeout(function(){wrap.innerHTML='';},4000);
}
